name: Deploy to Kubernetes

run-name: "Deploy to ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }} by @${{ github.actor }}"

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 대상 환경'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-k8s-${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
  cancel-in-progress: false

env:
  GIT_PROJECT_NAME: about-client
  AWS_REGION: ap-northeast-2
  AWS_ROLE: arn:aws:iam::010928206252:role/uoslife-v2025--deployment
  ECR_REGISTRY: 010928206252.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: teampage/client

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve Deploy Environment
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Version
        id: version
        run: echo "version=$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-env
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ needs.resolve-env.outputs.environment }}
      VERSION: ${{ needs.resolve-env.outputs.version }}
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          role-session-name: GithubDeployment
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          file: ./apps/teampage/Dockerfile
          context: .
          push: true
          target: runner
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
            NOTION_PEOPLE_DATABASE_ID=${{ secrets.NOTION_PEOPLE_DATABASE_ID }}
            KEYCLOAK_CLIENT_ID=${{ secrets.KEYCLOAK_CLIENT_ID }}
            KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }}
            KEYCLOAK_ISSUER=${{ secrets.KEYCLOAK_ISSUER }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            NEXT_PUBLIC_AMPLITUDE_API_KEY=${{ secrets.NEXT_PUBLIC_AMPLITUDE_API_KEY }}
            NEXT_PUBLIC_GA4_TRACKING_ID=${{ secrets.NEXT_PUBLIC_GA4_TRACKING_ID }}
            NEXT_PUBLIC_API_BASE_URL=${{ env.DEPLOY_ENV == 'prod' && secrets.NEXT_PUBLIC_API_BASE_URL_PROD || secrets.NEXT_PUBLIC_API_BASE_URL_DEV }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.VERSION }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    needs: [resolve-env, build]
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ needs.resolve-env.outputs.environment }}
      VERSION: ${{ needs.resolve-env.outputs.version }}
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: uoslife/gitops
          ref: main
          ssh-key: ${{ secrets.GITOPS_SSH_KEY }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Image Tag
        run: |
          cd projects/${{ env.GIT_PROJECT_NAME }}/overlays/${{ env.DEPLOY_ENV }}
          kustomize edit set image ${{ env.ECR_REPOSITORY }}=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.VERSION }}

      - name: Validate Kustomize Build
        run: kustomize build projects/${{ env.GIT_PROJECT_NAME }}/overlays/${{ env.DEPLOY_ENV }} > /dev/null

      - name: Commit and Push
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"
          git add .
          git commit -m "projects(${{ env.GIT_PROJECT_NAME }}): deploy ${{ env.DEPLOY_ENV }} to ${{ env.VERSION }} (${SHORT_SHA})"
          git pull --rebase origin main
          git push
